name: code-first-agent-starter
version: 0.2.0
description: >-
  Curated aggregator for building a code-first AI agent end-to-end. Composes four
  focused sub-packages — agent-design (architecture decisions, sandboxing, the
  architect agent), dotnet-implementation (MAF scaffolding, patterns, Aspire, the
  builder agent), azure-infrastructure (Container Apps, Bicep, ADO pipelines,
  identity), and quality-safety (evaluation, guardrails).
author: code-first-agent-starter
# Curated aggregator: each sub-package is independently installable and owns its
# own apm.yml + .apm/ tree. Installing this root pulls all four.
dependencies:
  apm:
    - danielstegeman/agent-design
    - danielstegeman/dotnet-implementation
    - danielstegeman/azure-infrastructure
    - danielstegeman/quality-safety
  mcp: []
scripts: {}
